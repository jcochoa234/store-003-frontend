server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                            always;
    add_header X-Frame-Options         "DENY"                               always;
    add_header X-XSS-Protection        "1; mode=block"                      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # Remove server fingerprinting
    server_tokens off;

    # Angular HTML5 routing — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets (Angular adds content hashes)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html — Angular replaces it on every deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Health check endpoint — used by docker-compose healthcheck
    location = /health {
        access_log  off;
        return 200  "OK";
        add_header  Content-Type text/plain;
    }
}
